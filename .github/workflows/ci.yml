name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Quality Gate — lint, typecheck, format check
  # ─────────────────────────────────────────────────────────────
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  # ─────────────────────────────────────────────────────────────
  # Job 2: Build — compile TypeScript for all packages
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @construction/shared build

      - name: Build web package
        run: pnpm --filter @construction/web build

      - name: Build API package
        run: pnpm --filter @construction/api build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 3: Database Migration — verify migrations run cleanly
  # ─────────────────────────────────────────────────────────────
  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: construction_mgmt
          MYSQL_USER: appuser
          MYSQL_PASSWORD: apppassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=30s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm --filter @construction/api db:migrate
        env:
          DATABASE_URL: mysql://appuser:apppassword@127.0.0.1:3306/construction_mgmt

      - name: Seed database
        run: pnpm --filter @construction/api db:seed
        env:
          DATABASE_URL: mysql://appuser:apppassword@127.0.0.1:3306/construction_mgmt

  # ─────────────────────────────────────────────────────────────
  # Job 4: Tests — unit + integration tests
  # ─────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: construction_mgmt_test
          MYSQL_USER: appuser
          MYSQL_PASSWORD: apppassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=30s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup test database
        run: pnpm --filter @construction/api db:migrate
        env:
          DATABASE_URL: mysql://appuser:apppassword@127.0.0.1:3306/construction_mgmt_test

      - name: Run shared tests
        run: pnpm --filter @construction/shared test
        env:
          NODE_ENV: test

      - name: Run API tests
        run: pnpm --filter @construction/api test
        env:
          NODE_ENV: test
          DATABASE_URL: mysql://appuser:apppassword@127.0.0.1:3306/construction_mgmt_test
          JWT_SECRET: ci-jwt-secret-for-testing-min32chars-abc
          JWT_REFRESH_SECRET: ci-jwt-refresh-secret-for-testing-min32chars-def

      - name: Run web tests
        run: pnpm --filter @construction/web test
        env:
          NODE_ENV: test

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            packages/api/coverage
            packages/web/coverage
            packages/shared/coverage
          retention-days: 7
